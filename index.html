<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC 부하계산서 + 용량계산서</title>
<style>
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --navy: #1e3a5f;
  --navy-light: #2d5a8e;
  --red: #dc2626;
  --blue: #2563eb;
  --blue-bg: #eff6ff;
  --green: #16a34a;
  --gray: #64748b;
  --gray-light: #e2e8f0;
  --gray-lighter: #f8fafc;
  --border: #cbd5e1;
  --text: #1e293b;
  --text-sm: #475569;
  --radius: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

/* ── TAB BAR ── */
#tab-bar { display: flex; background: var(--navy); padding: 0 16px; gap: 2px; }
.tab-btn { padding: 12px 20px; color: rgba(255,255,255,0.65); cursor: pointer; border: none; background: none; font-size: 13px; font-family: inherit; border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; }
.tab-btn.active { color: #fff; border-bottom-color: #60a5fa; }
.tab-btn:hover { color: #fff; }

/* ── TOOLBAR ── */
#toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
#toolbar .proj-name { font-weight: 700; color: var(--navy); font-size: 14px; flex: 1; }
.btn { padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 12px; font-family: inherit; transition: all .15s; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--navy); color: #fff; border-color: var(--navy); }
.btn-primary:hover { background: var(--navy-light); }
.btn-danger { background: var(--red); color: #fff; border-color: var(--red); }
.btn-blue { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-green { background: var(--green); color: #fff; border-color: var(--green); }

/* ── PANELS ── */
.tab-panel { display: none; height: calc(100vh - 88px); overflow: auto; padding: 16px; }
.tab-panel.active { display: block; }

/* ── CARDS ── */
.card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 12px; }
.card-header { padding: 10px 14px; border-bottom: 1px solid var(--border); font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; font-size: 13px; }
.card-body { padding: 14px; }

/* ── FORM GRID ── */
.form-grid { display: grid; gap: 10px; }
.form-grid.col2 { grid-template-columns: 1fr 1fr; }
.form-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
.form-grid.col4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: var(--text-sm); font-weight: 600; }
.form-group input, .form-group select, .form-group textarea {
  padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 12px; font-family: inherit; color: var(--text); background: #fff;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--blue); }
.form-group input.auto { background: var(--blue-bg); color: var(--blue); font-weight: 600; }
.form-group input[readonly] { background: var(--gray-lighter); color: var(--text-sm); }

/* ── SPLIT LAYOUT (Tab ②) ── */
#tab2-wrap { display: flex; height: calc(100vh - 88px); gap: 0; }
#room-list-panel { width: 280px; min-width: 200px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
#room-list-panel .panel-header { padding: 10px 12px; background: var(--navy); color: #fff; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: space-between; }
#room-list-scroll { flex: 1; overflow-y: auto; }
.room-item { padding: 9px 12px; border-bottom: 1px solid var(--gray-light); cursor: pointer; transition: background .15s; display: flex; justify-content: space-between; align-items: center; }
.room-item:hover { background: var(--bg); }
.room-item.selected { background: var(--blue-bg); border-left: 3px solid var(--blue); }
.room-item-name { font-weight: 600; font-size: 12px; }
.room-item-sub { font-size: 11px; color: var(--text-sm); margin-top: 2px; }
.room-item-del { color: var(--red); cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 3px; }
.room-item-del:hover { background: #fee2e2; }
#room-detail-panel { flex: 1; overflow-y: auto; padding: 16px; }

/* ── TABLES ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: var(--navy); color: #fff; padding: 7px 8px; text-align: center; font-weight: 600; white-space: nowrap; position: sticky; top: 0; z-index: 2; }
td { padding: 5px 7px; border-bottom: 1px solid var(--gray-light); text-align: right; vertical-align: middle; }
td.left { text-align: left; }
td.center { text-align: center; }
tr:hover td { background: #f8fafc; }
td.auto { background: var(--blue-bg); color: var(--blue); font-weight: 600; }
td.section { background: #f0f4f8; font-weight: 700; color: var(--navy); text-align: left; }
td.total-row { background: #e0e7ff; font-weight: 700; color: var(--navy); }

/* ── SECTION DIVIDER ── */
.section-title { font-size: 13px; font-weight: 700; color: var(--navy); padding: 8px 0 6px; border-bottom: 2px solid var(--navy); margin-bottom: 10px; }

/* ── FLOOR LIST ── */
.floor-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--gray-light); }
.floor-item input { flex: 1; }
.floor-del { color: var(--red); cursor: pointer; font-size: 16px; padding: 2px 6px; }

/* ── CAPACITY GROUPS ── */
.cap-group-card { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.cap-group-header { background: #f0f4f8; padding: 8px 12px; display: flex; align-items: center; gap: 8px; font-weight: 700; }
.cap-group-body { padding: 12px; }
.room-tag { display: inline-flex; align-items: center; gap: 4px; background: var(--blue-bg); color: var(--blue); border-radius: 12px; padding: 2px 8px; font-size: 11px; margin: 2px; cursor: pointer; }
.room-tag .rm-x { color: var(--red); font-weight: 700; }

/* ── MODAL ── */
#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
#modal-box { background: #fff; border-radius: 8px; padding: 20px; width: 480px; max-width: 95vw; max-height: 85vh; overflow-y: auto; }
#modal-box h3 { font-size: 15px; color: var(--navy); margin-bottom: 14px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ── PRINT ── */
@media print {
  #tab-bar, #toolbar, #room-list-panel, .no-print { display: none !important; }
  .tab-panel { display: block !important; height: auto !important; overflow: visible !important; padding: 0 !important; }
  body { background: #fff; font-size: 10pt; }
  th { background: #1e3a5f !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  td.auto { background: #eff6ff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .card { box-shadow: none; break-inside: avoid; }
  table { break-inside: auto; }
  tr { break-inside: avoid; }
}

/* ── SCROLL ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── BADGE ── */
.badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; }
.badge-blue { background: var(--blue-bg); color: var(--blue); }
.badge-red { background: #fee2e2; color: var(--red); }
.badge-green { background: #dcfce7; color: var(--green); }
.badge-gray { background: var(--gray-light); color: var(--text-sm); }

.empty-msg { text-align: center; padding: 40px; color: var(--text-sm); font-size: 13px; }
</style>
</head>
<body>

<!-- TAB BAR -->
<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab(0)">① 프로젝트 설정</button>
  <button class="tab-btn" onclick="switchTab(1)">② 실 목록 관리</button>
  <button class="tab-btn" onclick="switchTab(2)">③ 부하계산서</button>
  <button class="tab-btn" onclick="switchTab(3)">④ 용량계산서</button>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <span class="proj-name" id="proj-name-display">[ 프로젝트명 미설정 ]</span>
  <button class="btn" onclick="saveJSON()">JSON 저장</button>
  <button class="btn" onclick="document.getElementById('file-in').click()">JSON 불러오기</button>
  <input type="file" id="file-in" accept=".json" style="display:none" onchange="loadJSON(this)">
  <button class="btn btn-primary" onclick="window.print()">PDF 출력</button>
</div>

<!-- ①  프로젝트 설정 -->
<div class="tab-panel active" id="tab0">
  <div style="max-width:900px">
    <div class="card">
      <div class="card-header">기본 정보</div>
      <div class="card-body">
        <div class="form-grid col2">
          <div class="form-group">
            <label>프로젝트명</label>
            <input type="text" id="p-name" placeholder="예) 강남 오피스 HVAC" onchange="updateProj()">
          </div>
          <div class="form-group">
            <label>발주처</label>
            <input type="text" id="p-client" onchange="updateProj()">
          </div>
          <div class="form-group">
            <label>설계사</label>
            <input type="text" id="p-designer" onchange="updateProj()">
          </div>
          <div class="form-group">
            <label>작성일</label>
            <input type="date" id="p-date" onchange="updateProj()">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label>현장 주소</label>
            <input type="text" id="p-address" onchange="updateProj()">
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">기상 조건</div>
      <div class="card-body">
        <div class="form-grid col3">
          <div class="form-group">
            <label>지역 선택</label>
            <select id="p-location" onchange="onLocationChange()"></select>
          </div>
          <div class="form-group">
            <label>외기 냉방 설계온도 (℃ DB)</label>
            <input type="number" id="p-out-cool-db" class="auto" readonly>
          </div>
          <div class="form-group">
            <label>외기 냉방 설계온도 (℃ WB)</label>
            <input type="number" id="p-out-cool-wb" class="auto" readonly>
          </div>
          <div class="form-group">
            <label>외기 난방 설계온도 (℃)</label>
            <input type="number" id="p-out-heat" class="auto" readonly>
          </div>
          <div class="form-group">
            <label>위도 (°)</label>
            <input type="number" id="p-lat" class="auto" readonly>
          </div>
          <div class="form-group">
            <label>사용자 정의 외기온 (℃ DB)</label>
            <input type="number" id="p-out-custom" placeholder="직접 입력 시" onchange="updateProj()">
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">건물 정보</div>
      <div class="card-body">
        <div class="form-grid col4">
          <div class="form-group">
            <label>단열 등급</label>
            <select id="p-insul" onchange="updateProj()">
              <option value="1">1등급 (최고)</option>
              <option value="2" selected>2등급</option>
              <option value="3">3등급</option>
              <option value="4">4등급 (최저)</option>
            </select>
          </div>
          <div class="form-group">
            <label>건물 용도</label>
            <select id="p-usage" onchange="updateProj()">
              <option value="office">업무시설</option>
              <option value="store">판매시설</option>
              <option value="school">교육연구</option>
              <option value="hospital">의료시설</option>
              <option value="hotel">숙박시설</option>
              <option value="factory">공장</option>
              <option value="etc">기타</option>
            </select>
          </div>
          <div class="form-group">
            <label>실내 냉방 설계온도 (℃)</label>
            <input type="number" id="p-in-cool" value="26" onchange="updateProj()">
          </div>
          <div class="form-group">
            <label>실내 냉방 습도 (%RH)</label>
            <input type="number" id="p-in-cool-rh" value="50" onchange="updateProj()">
          </div>
          <div class="form-group">
            <label>실내 난방 설계온도 (℃)</label>
            <input type="number" id="p-in-heat" value="22" onchange="updateProj()">
          </div>
          <div class="form-group">
            <label>안전율 (냉방)</label>
            <input type="number" id="p-sf-cool" value="1.10" step="0.01" onchange="updateProj()">
          </div>
          <div class="form-group">
            <label>안전율 (난방)</label>
            <input type="number" id="p-sf-heat" value="1.10" step="0.01" onchange="updateProj()">
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        층 구성
        <button class="btn btn-primary no-print" onclick="addFloor()" style="margin-left:auto;font-size:11px">+ 층 추가</button>
      </div>
      <div class="card-body">
        <div id="floor-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ② 실 목록 관리 -->
<div class="tab-panel" id="tab1">
  <div id="tab2-wrap">
    <div id="room-list-panel">
      <div class="panel-header">
        실 목록
        <button class="btn no-print" onclick="addRoom()" style="background:#60a5fa;color:#fff;border:none;padding:4px 10px;font-size:11px;border-radius:4px;cursor:pointer">+ 추가</button>
      </div>
      <div id="room-list-scroll"></div>
    </div>
    <div id="room-detail-panel">
      <div id="room-detail-content">
        <div class="empty-msg">왼쪽 목록에서 실을 선택하거나 추가하세요.</div>
      </div>
    </div>
  </div>
</div>

<!-- ③ 부하계산서 -->
<div class="tab-panel" id="tab2">
  <div id="load-calc-content">
    <div class="empty-msg">실 목록을 먼저 설정하세요.</div>
  </div>
</div>

<!-- ④ 용량계산서 -->
<div class="tab-panel" id="tab3">
  <div class="card no-print">
    <div class="card-header">
      용량 그룹 관리
      <button class="btn btn-primary" onclick="addCapGroup()" style="margin-left:auto;font-size:11px">+ 그룹 추가</button>
    </div>
    <div class="card-body" id="cap-group-list"></div>
  </div>
  <div id="cap-calc-content"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal-box">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModalDirect()">취소</button>
      <button class="btn btn-primary" id="modal-ok" onclick="modalOK()">확인</button>
    </div>
  </div>
</div>

// ═══════════════════════════════════════════════════════
//  LOAD CALCULATION ENGINE
// ═══════════════════════════════════════════════════════

function calcRoomCoolingLoad(room, timeIdx) {
  if (room.coolLoadManual !== null) return room.coolLoadManual;

  const p = STATE.project;
  const insul = p.insul - 1; // 0-based index
  const dT_cool = (p.outCustom || p.outCoolDB) - p.inCool; // ΔT exterior cooling

  let sensible = 0;
  let latent = 0;

  // 1. Wall conduction (external walls only)
  room.walls.forEach(w => {
    if (!w.isExt || w.area <= 0) return;
    const U = w.uCustom || U_VALUES.wall[insul];
    sensible += U * w.area * dT_cool;
  });

  // 2. Roof conduction
  if (room.roof.isExt && room.roof.area > 0) {
    const U = U_VALUES.roof[insul];
    const dT_roof = dT_cool + 5; // sol-air correction
    sensible += U * room.roof.area * dT_roof;
  }

  // 3. Floor (external, e.g., above outdoor car park)
  if (room.floor.isExt && room.floor.area > 0) {
    const U = U_VALUES.floor[insul];
    sensible += U * room.floor.area * dT_cool * 0.5;
  }

  // 4. Window solar radiation + conduction
  room.windows.forEach(w => {
    if (w.area <= 0) return;
    const sc = SC_VALUES[w.sc] || 0.45;
    const Uw = U_VALUES.window[insul];
    const solar = (SOLAR_RADIATION[w.dir] || SOLAR_RADIATION['S'])[timeIdx];
    sensible += w.area * sc * solar;              // solar gain
    sensible += Uw * w.area * dT_cool;            // conduction
  });

  // 5. Infiltration sensible + latent
  const vol = room.area * room.height;
  const infCMH = vol * room.infACH;
  // sensible: ρ·Cp·ΔT  ≈ 0.335 W/(m³/h·K)
  sensible += 0.335 * infCMH * dT_cool;
  // latent (humidity ratio difference, simplified)
  const dWB = (p.outCoolWB - 19); // difference from ~19°C WB inside
  latent += 0.84 * infCMH * Math.max(0, dWB);

  // 6. Ventilation sensible + latent
  if (room.ventCMH > 0) {
    sensible += 0.335 * room.ventCMH * dT_cool;
    latent += 0.84 * room.ventCMH * Math.max(0, dWB);
  }

  // 7. Occupancy
  const hh = HUMAN_HEAT[room.occHeat] || HUMAN_HEAT.default;
  sensible += room.occ * hh.s;
  latent   += room.occ * hh.l;

  // 8. Lighting (100% sensible)
  sensible += room.lightW;

  // 9. Equipment (70% sensible, 30% latent simplified)
  sensible += room.equipW * 0.7;
  latent   += room.equipW * 0.3;

  return Math.max(0, sensible + latent);
}

function calcRoomHeatingLoad(room) {
  if (room.heatLoadManual !== null) return room.heatLoadManual;

  const p = STATE.project;
  const insul = p.insul - 1;
  const dT_heat = p.inHeat - (p.outCustom || p.outHeat);

  let load = 0;

  // Walls
  room.walls.forEach(w => {
    if (!w.isExt || w.area <= 0) return;
    const U = w.uCustom || U_VALUES.wall[insul];
    load += U * w.area * dT_heat;
  });

  // Roof
  if (room.roof.isExt && room.roof.area > 0) {
    load += U_VALUES.roof[insul] * room.roof.area * dT_heat;
  }

  // Floor
  if (room.floor.isExt && room.floor.area > 0) {
    load += U_VALUES.floor[insul] * room.floor.area * dT_heat * 0.5;
  }

  // Windows
  room.windows.forEach(w => {
    if (w.area <= 0) return;
    load += U_VALUES.window[insul] * w.area * dT_heat;
  });

  // Infiltration
  const vol = room.area * room.height;
  const infCMH = vol * room.infACH;
  load += 0.335 * infCMH * dT_heat;

  // Ventilation
  if (room.ventCMH > 0) {
    load += 0.335 * room.ventCMH * dT_heat;
  }

  return Math.max(0, load);
}

function getMaxCoolingLoad(room) {
  if (room.coolLoadManual !== null) return room.coolLoadManual;
  return Math.max(...TIME_SLOTS.map((_, i) => calcRoomCoolingLoad(room, i)));
}

function calcRoomDetail(room, timeIdx) {
  const p = STATE.project;
  const insul = p.insul - 1;
  const dT_cool = (p.outCustom || p.outCoolDB) - p.inCool;

  let solar=0, wall=0, winCond=0, roof=0, inf=0, vent=0, occ=0, light=0, equip=0;

  room.walls.forEach(w => {
    if (!w.isExt || w.area <= 0) return;
    const U = w.uCustom || U_VALUES.wall[insul];
    wall += U * w.area * dT_cool;
  });

  if (room.roof.isExt && room.roof.area > 0) {
    roof += U_VALUES.roof[insul] * room.roof.area * (dT_cool + 5);
  }

  room.windows.forEach(w => {
    if (w.area <= 0) return;
    const sc = SC_VALUES[w.sc] || 0.45;
    const Uw = U_VALUES.window[insul];
    const sol = (SOLAR_RADIATION[w.dir] || SOLAR_RADIATION['S'])[timeIdx];
    solar += w.area * sc * sol;
    winCond += Uw * w.area * dT_cool;
  });

  const vol = room.area * room.height;
  const infCMH = vol * room.infACH;
  const dWB = Math.max(0, p.outCoolWB - 19);
  inf = 0.335 * infCMH * dT_cool + 0.84 * infCMH * dWB;

  if (room.ventCMH > 0) {
    vent = 0.335 * room.ventCMH * dT_cool + 0.84 * room.ventCMH * dWB;
  }

  const hh = HUMAN_HEAT[room.occHeat] || HUMAN_HEAT.default;
  occ = room.occ * (hh.s + hh.l);
  light = room.lightW;
  equip = room.equipW;

  const total = Math.max(0, solar + wall + winCond + roof + inf + vent + occ + light + equip);
  return { solar, wall, winCond, roof, inf, vent, occ, light, equip, total };
}

function addCapGroup() {
  STATE.capGroups.push({
    id: 'G' + (STATE._nextGroupId++),
    name: '그룹 ' + STATE._nextGroupId,
    roomIds: [],
    coolType: 'EHP',
    heatType: 'EHP',
    ventType: '전열교환기',
    note: '',
    equipModel: '',
    equipCount: 1,
  });
  renderCapCalc();
}

function delCapGroup(gid) {
  if (!confirm('그룹을 삭제하시겠습니까?')) return;
  STATE.capGroups = STATE.capGroups.filter(g => g.id !== gid);
  renderCapCalc();
}

function renderCapCalc() {
  const glEl = document.getElementById('cap-group-list');
  const ccEl = document.getElementById('cap-calc-content');

  if (STATE.capGroups.length === 0) {

    return;
  }

  const p = STATE.project;

  glEl.innerHTML = STATE.capGroups.map((g, gi) => {
    const assignedRooms = STATE.rooms.filter(r => g.roomIds.includes(r.id));

        </div>

          <div class="form-group">
            <label>냉방 방식</label>
            <select onchange="STATE.capGroups[${gi}].coolType=this.value">

              <option ${g.coolType==='PAC'?'selected':''}>PAC</option>
              <option ${g.coolType==='AHU'?'selected':''}>AHU</option>
              <option ${g.coolType==='CTH'?'selected':''}>CTH</option>
              <option ${g.coolType==='FCU'?'selected':''}>FCU</option>
              <option ${g.coolType==='기타'?'selected':''}>기타</option>
            </select>
          </div>

              <option ${g.heatType==='보일러'?'selected':''}>보일러</option>
              <option ${g.heatType==='유니트히터'?'selected':''}>유니트히터</option>
              <option ${g.heatType==='라디에이터'?'selected':''}>라디에이터</option>

        <th>냉방용량<br>필요 (kW)</th>
        <th>난방부하<br>합계 (W)</th>
        <th>안전율<br>(×${p.sfHeat})</th>
        <th>난방용량<br>필요 (W)</th>
        <th>환기량<br>합계 (CMH)</th>
        <th>냉방 방식</th>
        <th>선정 기기</th>
        <th>수량</th>

      </tr>

  let totCool = 0, totHeat = 0, totVent = 0;

  STATE.capGroups.forEach(g => {

    const coolSum = rooms.reduce((s, r) => s + getMaxCoolingLoad(r), 0);
    const heatSum = rooms.reduce((s, r) => s + calcRoomHeatingLoad(r), 0);
    const ventSum = rooms.reduce((s, r) => s + (r.ventCMH || 0), 0);
    const coolReq = coolSum * p.sfCool;
    const heatReq = heatSum * p.sfHeat;
    totCool += coolReq;
    totHeat += heatReq;
    totVent += ventSum;

    html += `<tr>

      <td class="auto" style="font-weight:700">${fmt1(coolReq/1000)}</td>
      <td class="auto" style="color:var(--red)">${fmtW(heatSum)}</td>

  html += `<tr class="total-row">

    <td>${fmtW(totCool)}</td>
    <td>${fmt1(totCool/1000)} kW</td>
    <td colspan="2"></td>
    <td>${fmtW(totHeat)}</td>
    <td>${Math.round(totVent).toLocaleString('ko-KR')}</td>
    <td colspan="4"></td>
  </tr>`;

  html += `</tbody></table></div></div></div>`;
  ccEl.innerHTML = html;
}

function addRoomToGroup(gid, rid) {
  if (!rid) return;
  const g = STATE.capGroups.find(g => g.id === gid);
  if (g && !g.roomIds.includes(rid)) {
    g.roomIds.push(rid);
    renderCapCalc();
  }
}

function removeRoomFromGroup(gid, rid) {
  const g = STATE.capGroups.find(g => g.id === gid);
  if (g) {
    g.roomIds = g.roomIds.filter(r => r !== rid);
    renderCapCalc();
  }
}

function openModal(title, body, okCb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
  modalCallback = okCb;
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalCallback = null;
}

function modalOK() {
  if (modalCallback) modalCallback();
  closeModalDirect();
}

function saveJSON() {
  const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (STATE.project.name || 'hvac-calc') + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      STATE = data;
      loadStateToForm();
      renderFloorList();
      renderRoomList();
      renderRoomDetail();
      renderLoadCalc();
      renderCapCalc();
      alert('불러오기 완료');
    } catch {
      alert('JSON 파싱 오류');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt1(n) {
  return typeof n === 'number' ? n.toLocaleString('ko-KR', {maximumFractionDigits:1}) : '—';
}

function fmt2(n) {
  return typeof n === 'number' ? n.toFixed(2) : '—';
}

function fmtW(n) {
  if (n === null || n === undefined) return '—';
  return Math.round(n).toLocaleString('ko-KR');
}

// ═══════════════════════════════════════════════════════

init();
</script>

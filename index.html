<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC 부하계산서 + 용량계산서</title>
<style>
:root{
  --bg:#f1f5f9;--sur:#fff;--nv:#1e3a5f;--nv2:#2d5a8e;
  --red:#dc2626;--bl:#2563eb;--blbg:#eff6ff;--gr:#16a34a;
  --gray:#64748b;--gl:#e2e8f0;--glr:#f8fafc;--bdr:#cbd5e1;
  --tx:#1e293b;--tsm:#475569;--r:5px;--sh:0 1px 3px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--tx);font-size:12px}
/* TAB BAR */
#tab-bar{display:flex;background:var(--nv);padding:0 12px;gap:2px}
.tb{padding:11px 18px;color:rgba(255,255,255,.6);cursor:pointer;border:none;background:none;font-size:12px;font-family:inherit;border-bottom:3px solid transparent;white-space:nowrap}
.tb.on{color:#fff;border-bottom-color:#60a5fa}.tb:hover{color:#fff}
/* TOOLBAR */
#tbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--sur);border-bottom:1px solid var(--bdr);flex-wrap:wrap}
#tbar .pname{font-weight:700;color:var(--nv);font-size:13px;flex:1}
.btn{padding:5px 12px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--sur);color:var(--tx);cursor:pointer;font-size:11px;font-family:inherit}
.btn:hover{background:var(--bg)}.btP{background:var(--nv);color:#fff;border-color:var(--nv)}.btP:hover{background:var(--nv2)}
.btS{font-size:10px;padding:3px 8px}
/* PANELS */
.tp{display:none;height:calc(100vh - 84px);overflow:auto;padding:12px}
.tp.on{display:block}
/* CARDS */
.card{background:var(--sur);border-radius:var(--r);border:1px solid var(--bdr);box-shadow:var(--sh);margin-bottom:10px}
.ch{padding:9px 12px;border-bottom:1px solid var(--bdr);font-weight:700;color:var(--nv);display:flex;align-items:center;gap:6px;font-size:12px}
.cb{padding:12px}
/* FORM */
.fg{display:grid;gap:8px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg5{grid-template-columns:repeat(5,1fr)}
.fg6{grid-template-columns:repeat(6,1fr)}
.fgr{display:flex;gap:6px;align-items:center}
.fv{display:flex;flex-direction:column;gap:3px}
.fv label{font-size:10px;color:var(--tsm);font-weight:600}
.fv input,.fv select{padding:5px 7px;border:1px solid var(--bdr);border-radius:var(--r);font-size:11px;font-family:inherit;background:#fff;color:var(--tx)}
.fv input:focus,.fv select:focus{outline:none;border-color:var(--bl)}
.fv input.au{background:var(--blbg);color:var(--bl);font-weight:600}
/* SPLIT */
#t1w{display:flex;height:calc(100vh - 84px)}
#rlp{width:250px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column}
#rlp .rph{padding:9px 12px;background:var(--nv);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:space-between}
#rls{flex:1;overflow-y:auto}
.rgi{padding:5px 10px;background:#f0f4f8;font-weight:700;color:var(--nv);font-size:11px;border-bottom:1px solid var(--bdr)}
.rfi{padding:3px 10px 3px 18px;font-size:10px;color:var(--gray);background:#f8fafc;border-bottom:1px solid var(--gl)}
.ri{padding:7px 10px 7px 24px;border-bottom:1px solid var(--gl);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.ri:hover{background:var(--bg)}.ri.sel{background:var(--blbg);border-left:3px solid var(--bl)}
.ri-n{font-weight:600;font-size:11px}.ri-s{font-size:10px;color:var(--tsm)}
.ri-d{color:var(--red);cursor:pointer;padding:1px 4px;font-size:13px}.ri-d:hover{background:#fee2e2;border-radius:3px}
#rdp{flex:1;overflow-y:auto;padding:12px}
/* TABLES */
.tw{overflow-x:auto;margin-bottom:4px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:var(--nv);color:#fff;padding:6px 5px;text-align:center;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:4px 5px;border-bottom:1px solid var(--gl);text-align:right;vertical-align:middle}
td.L{text-align:left}td.C{text-align:center}
tr:hover td{background:#f8fafc}
td.au{background:var(--blbg);color:var(--bl);font-weight:600}
td.s0{background:#e0e7ef;font-weight:700;color:var(--nv);text-align:left;font-size:10px;padding:3px 5px}
td.tot{background:#dbeafe;font-weight:700}
td.pk{background:#fef9c3;color:#92400e;font-weight:700}
td.rsh{background:#dcfce7;color:#166534;font-weight:700}
td.ht{background:#fee2e2;color:var(--red);font-weight:700}
td input,td select{border:1px solid var(--bdr);border-radius:3px;padding:2px 4px;font-size:10px;font-family:inherit;width:100%;background:#fff}
td input:focus,td select:focus{outline:none;border-color:var(--bl)}
/* BUILDING TREE */
.bcard{border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:8px}
.bhead{background:#f0f4f8;padding:7px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bdr)}
.bbody{padding:10px 12px}
.floor-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--gl)}
/* CAP SUBTABS */
#cst{display:flex;gap:3px;padding:0 0 10px;flex-wrap:wrap}
.csb{padding:5px 12px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--sur);color:var(--tx);cursor:pointer;font-size:11px;font-family:inherit}
.csb.on{background:var(--nv);color:#fff;border-color:var(--nv)}
/* LOAD ESTIMATE CARD */
.lec{background:var(--sur);border:2px solid var(--nv);border-radius:var(--r);margin-bottom:20px}
.leh{background:var(--nv);color:#fff;padding:9px 12px}
.leh-t{font-size:14px;font-weight:700;letter-spacing:.5px}
.leh-g{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:6px;font-size:10px}
.leh-g span{color:rgba(255,255,255,.8)}.leh-g strong{color:#fff}
.lec-d{background:#f0f7ff;padding:7px 12px;border-bottom:1px solid var(--bdr);font-size:10px;display:flex;flex-wrap:wrap;gap:12px}
.lec-b{padding:10px 12px}
.no-cool{text-align:center;padding:16px;color:var(--gray);font-size:12px;border:2px dashed var(--bdr);border-radius:var(--r);margin-bottom:10px}
/* SECTION TITLE */
.st{font-size:12px;font-weight:700;color:var(--nv);padding:7px 0 5px;border-bottom:2px solid var(--nv);margin-bottom:8px;margin-top:12px;display:flex;align-items:center;gap:8px}
.st:first-child{margin-top:0}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700}
.bg{background:var(--blbg);color:var(--bl)}.br{background:#fee2e2;color:var(--red)}.bgr{background:#dcfce7;color:var(--gr)}
.empty{text-align:center;padding:32px;color:var(--tsm)}
/* PRINT */
@media print{
  #tab-bar,#tbar,.no-print{display:none !important}
  .tp{display:block !important;height:auto !important;overflow:visible !important;padding:0 !important}
  #t1w{display:block !important;height:auto !important}
  #rlp{display:none !important}
  #rdp{padding:0 !important}
  body{background:#fff;font-size:8pt}
  .lec{break-after:page;border:1px solid #000;margin-bottom:0}
  .leh{background:#1e3a5f !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th{background:#1e3a5f !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.au{background:#eff6ff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.pk{background:#fef9c3 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.rsh{background:#dcfce7 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.ht{background:#fee2e2 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.s0{background:#e0e7ef !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{size:A3 landscape;margin:10mm}
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
</style>
</head>
<body>
<div id="tab-bar">
  <button class="tb on" onclick="switchTab(0)">① 프로젝트 설정</button>
  <button class="tb" onclick="switchTab(1)">② 실 목록 관리</button>
  <button class="tb" onclick="switchTab(2)">③ 부하계산서</button>
  <button class="tb" onclick="switchTab(3)">④ 용량계산서</button>
</div>
<div id="tbar">
  <span class="pname" id="pndisp">[ 프로젝트명 미설정 ]</span>
  <button class="btn" onclick="saveJSON()">JSON 저장</button>
  <button class="btn" onclick="document.getElementById('fi').click()">JSON 불러오기</button>
  <input type="file" id="fi" accept=".json" style="display:none" onchange="loadJSON(this)">
  <button class="btn btP" onclick="window.print()">PDF 출력</button>
</div>

<!-- ① 프로젝트 설정 -->
<div class="tp on" id="tab0">
<div style="max-width:820px">
  <div class="card">
    <div class="ch">기본 정보</div>
    <div class="cb">
      <div class="fg c3">
        <div class="fv"><label>프로젝트명</label><input type="text" id="p-name" onchange="updP()"></div>
        <div class="fv"><label>과업번호 (JOB NO.)</label><input type="text" id="p-jobno" onchange="updP()"></div>
        <div class="fv"><label>발주처</label><input type="text" id="p-client" onchange="updP()"></div>
        <div class="fv"><label>설계사</label><input type="text" id="p-designer" onchange="updP()"></div>
        <div class="fv"><label>작성일</label><input type="date" id="p-date" onchange="updP()"></div>
        <div class="fv"><label>현장 주소</label><input type="text" id="p-addr" onchange="updP()"></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="ch">기상 조건</div>
    <div class="cb">
      <div class="fg c3">
        <div class="fv"><label>지역 선택</label><select id="p-loc" onchange="onLocChange()"></select></div>
        <div class="fv"><label>외기 냉방 DB (℃)</label><input type="number" id="p-cdb" class="au" readonly></div>
        <div class="fv"><label>외기 냉방 WB (℃)</label><input type="number" id="p-cwb" class="au" readonly></div>
        <div class="fv"><label>외기 난방 DB (℃)</label><input type="number" id="p-hdb" class="au" readonly></div>
        <div class="fv"><label>위도 (°)</label><input type="number" id="p-lat" class="au" readonly></div>
        <div class="fv"><label>외기온 직접입력 (℃ DB, 선택)</label><input type="number" id="p-cust" placeholder="직접 입력 시" onchange="updP()"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="ch">
      건물 / 층 구성
      <button class="btn btP btS no-print" onclick="addBldg()" style="margin-left:auto">+ 건물 추가</button>
    </div>
    <div class="cb" id="bldg-tree"></div>
  </div>
</div>
</div>

<!-- ② 실 목록 관리 -->
<div class="tp" id="tab1">
  <div id="t1w">
    <div id="rlp">
      <div class="rph">
        실 목록
        <button onclick="addRoom()" style="background:#60a5fa;color:#fff;border:none;padding:3px 9px;font-size:10px;border-radius:3px;cursor:pointer">+ 추가</button>
      </div>
      <div id="rls"></div>
    </div>
    <div id="rdp">
      <div id="rdc"><div class="empty">왼쪽에서 실을 선택하거나 추가하세요.</div></div>
    </div>
  </div>
</div>

<!-- ③ 부하계산서 -->
<div class="tp" id="tab2">
  <div class="no-print" style="display:flex;align-items:center;gap:8px;margin-bottom:12px;background:var(--sur);padding:8px 12px;border-radius:var(--r);border:1px solid var(--bdr)">
    <label style="font-weight:700;font-size:12px;color:var(--nv)">실 선택:</label>
    <select id="le-room-sel" style="padding:5px 8px;border:1px solid var(--bdr);border-radius:var(--r);font-family:inherit;font-size:12px" onchange="scrollToRoom(this.value)"></select>
    <button class="btn btP btS" onclick="renderLoadCalc()">계산 새로고침</button>
  </div>
  <div id="lcc"><div class="empty">실 목록을 먼저 설정하세요.</div></div>
</div>

<!-- ④ 용량계산서 -->
<div class="tp" id="tab3">
  <div id="cst"></div>
  <div id="cc"></div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const OD = [ // outdoor conditions
  {n:"서울",   cdb:31.2,cwb:25.5,hdb:-11.3,lat:37.6},
  {n:"인천",   cdb:30.5,cwb:25.3,hdb:-10.4,lat:37.5},
  {n:"수원",   cdb:31.4,cwb:25.6,hdb:-11.7,lat:37.3},
  {n:"춘천",   cdb:32.1,cwb:25.4,hdb:-14.3,lat:37.9},
  {n:"강릉",   cdb:30.9,cwb:25.8,hdb: -7.4,lat:37.8},
  {n:"대전",   cdb:32.0,cwb:25.7,hdb: -9.2,lat:36.4},
  {n:"청주",   cdb:32.1,cwb:25.6,hdb:-10.3,lat:36.6},
  {n:"전주",   cdb:32.0,cwb:25.8,hdb: -8.0,lat:35.8},
  {n:"광주",   cdb:31.8,cwb:25.9,hdb: -5.1,lat:35.2},
  {n:"목포",   cdb:31.1,cwb:26.3,hdb: -3.9,lat:34.8},
  {n:"대구",   cdb:34.2,cwb:26.0,hdb: -6.9,lat:35.9},
  {n:"부산",   cdb:31.5,cwb:26.7,hdb: -3.0,lat:35.1},
  {n:"울산",   cdb:32.3,cwb:26.1,hdb: -5.5,lat:35.5},
  {n:"창원",   cdb:31.9,cwb:26.3,hdb: -5.0,lat:35.2},
  {n:"제주",   cdb:31.2,cwb:27.1,hdb:  2.0,lat:33.5},
  {n:"안동",   cdb:32.9,cwb:25.5,hdb:-11.8,lat:36.6},
  {n:"춘천",   cdb:32.1,cwb:25.4,hdb:-14.3,lat:37.9},
  {n:"속초",   cdb:30.1,cwb:25.7,hdb: -8.3,lat:38.2},
  {n:"천안",   cdb:31.9,cwb:25.5,hdb:-11.1,lat:36.8},
  {n:"기타",   cdb:31.0,cwb:25.5,hdb: -8.0,lat:36.5},
];

// Solar radiation W/m² at ~37°N, summer [10h,12h,14h,16h]
const SR = {
  N:[ 60, 80, 60, 60], E:[500,220, 50, 30],
  S:[200,350,350,200], W:[ 30, 50,220,500],
};
const TIME_SLOTS = [10,12,14,16];

// Room type definitions
const RT = {
  mech:      {lb:'기계실류',           cdb:null,crh:null,hdb:5,   hrh:null,od:0,    lw:15,ia:1.0,va:10, ce:'없음', he:'없음',     ve:'인라인덕트팬'},
  generator: {lb:'비상발전기실류',      cdb:50,  crh:null,hdb:5,   hrh:null,od:0,    lw:15,ia:0.5,va:30, ce:'없음', he:'유니트히터', ve:'벽부형팬'},
  elec:      {lb:'전기실류',            cdb:30,  crh:null,hdb:null,hrh:null,od:0,    lw:15,ia:0.5,va:12, ce:'PAC',  he:'없음',     ve:'벽부형팬'},
  toilet:    {lb:'화장실류',            cdb:null,crh:null,hdb:18,  hrh:null,od:0.02, lw:10,ia:1.0,va:15, ce:'없음', he:'라디에이터', ve:'천정형팬'},
  office:    {lb:'사무실/크레인조정실류',cdb:26,  crh:50, hdb:21,  hrh:50, od:0.05, lw:15,ia:0.5,va:5,  ce:'EHP',  he:'EHP',      ve:'전열교환기'},
  control:   {lb:'중앙제어실/계측류실', cdb:24,  crh:50, hdb:24,  hrh:50, od:0.05, lw:15,ia:0.5,va:10, ce:'PAC',  he:'PAC',      ve:'전열교환기'},
  storage:   {lb:'창고류',              cdb:null,crh:null,hdb:null,hrh:null,od:0,    lw:5, ia:0.5,va:3,  ce:'없음', he:'없음',     ve:'벽부형팬'},
};

const BLDG_USAGE = ['사무/업무시설','공장/산업시설','의료시설','교육시설','숙박시설','판매/상업시설','창고/물류시설','기타'];
const COOL_EQUIPS = ['PAC','EHP','CTH','없음'];
const HEAT_EQUIPS = ['EHP','PAC','유니트히터','라디에이터','전기온수기','없음'];
const VENT_EQUIPS = ['전열교환기','인라인덕트팬','천정형팬','벽부형팬','루프팬','없음'];

// ══════════════════════════════════════════════
//  PSYCHROMETRICS
// ══════════════════════════════════════════════
function pws(t){ return 610.78*Math.exp(17.27*t/(t+237.3)); }
function omegaWB(tdb,twb){ const p=pws(twb),ws=0.622*p/(101325-p); return ws-0.00066*(tdb-twb)*(1+0.00115*twb); }
function omegaRH(t,rh){ const p=(rh/100)*pws(t); return 0.622*p/(101325-p); }
function RHfromWB(tdb,twb){ const w=omegaWB(tdb,twb),pw=101325*w/(0.622+w); return Math.round(Math.min(100,100*pw/pws(tdb))); }
function dOmega(outDB,outWB,inDB,inRH){ return Math.max(0,omegaWB(outDB,outWB)-omegaRH(inDB,inRH||50)); }

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let STATE = {
  project:{name:'',jobNo:'',client:'',designer:'',date:'',addr:'',
    loc:'서울',cdb:31.2,cwb:25.5,hdb:-11.3,lat:37.6,cust:null},
  buildings:[
    {id:'B1',name:'건물1',usage:'공장/산업시설',
     floors:[{id:'F1',name:'1층',height:4.0},{id:'F2',name:'2층',height:4.0}]}
  ],
  rooms:[],
  _nB:2,_nF:10,_nR:1,
};
let selRid = null;
let capTab = 'PAC';

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function init(){
  const s=document.getElementById('p-loc');
  OD.forEach(c=>{const o=document.createElement('option');o.value=c.n;o.textContent=c.n;s.appendChild(o);});
  loadPtoForm(); renderBldgTree(); renderRoomList();
}

// ══════════════════════════════════════════════
//  TAB
// ══════════════════════════════════════════════
function switchTab(i){
  document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('on',i===j));
  document.querySelectorAll('.tp').forEach((p,j)=>p.classList.toggle('on',i===j));
  if(i===2) renderLoadCalc();
  if(i===3) renderCapCalc();
}

// ══════════════════════════════════════════════
//  PROJECT FORM
// ══════════════════════════════════════════════
function loadPtoForm(){
  const p=STATE.project;
  document.getElementById('p-name').value=p.name;
  document.getElementById('p-jobno').value=p.jobNo||'';
  document.getElementById('p-client').value=p.client;
  document.getElementById('p-designer').value=p.designer;
  document.getElementById('p-date').value=p.date;
  document.getElementById('p-addr').value=p.addr;
  document.getElementById('p-loc').value=p.loc;
  document.getElementById('p-cdb').value=p.cdb;
  document.getElementById('p-cwb').value=p.cwb;
  document.getElementById('p-hdb').value=p.hdb;
  document.getElementById('p-lat').value=p.lat;
  if(p.cust) document.getElementById('p-cust').value=p.cust;
  document.getElementById('pndisp').textContent=p.name||'[ 프로젝트명 미설정 ]';
}
function updP(){
  const p=STATE.project;
  p.name=document.getElementById('p-name').value;
  p.jobNo=document.getElementById('p-jobno').value;
  p.client=document.getElementById('p-client').value;
  p.designer=document.getElementById('p-designer').value;
  p.date=document.getElementById('p-date').value;
  p.addr=document.getElementById('p-addr').value;
  p.cust=parseFloat(document.getElementById('p-cust').value)||null;
  document.getElementById('pndisp').textContent=p.name||'[ 프로젝트명 미설정 ]';
}
function onLocChange(){
  const v=document.getElementById('p-loc').value, c=OD.find(x=>x.n===v); if(!c)return;
  Object.assign(STATE.project,{loc:v,cdb:c.cdb,cwb:c.cwb,hdb:c.hdb,lat:c.lat});
  document.getElementById('p-cdb').value=c.cdb;
  document.getElementById('p-cwb').value=c.cwb;
  document.getElementById('p-hdb').value=c.hdb;
  document.getElementById('p-lat').value=c.lat;
}

// ══════════════════════════════════════════════
//  BUILDING / FLOOR TREE
// ══════════════════════════════════════════════
function renderBldgTree(){
  const el=document.getElementById('bldg-tree');
  if(!STATE.buildings.length){el.innerHTML='<div class="empty">건물이 없습니다.</div>';return;}
  el.innerHTML = STATE.buildings.map((b,bi)=>`
  <div class="bcard">
    <div class="bhead">
      <span style="font-weight:700;color:var(--nv);min-width:60px">[건물${bi+1}]</span>
      <input type="text" value="${esc(b.name)}" placeholder="건물명" style="flex:2;padding:4px 7px;border:1px solid var(--bdr);border-radius:var(--r);font-family:inherit;font-size:11px"
        onchange="STATE.buildings[${bi}].name=this.value;renderRoomList()">
      <select style="flex:1;padding:4px 7px;border:1px solid var(--bdr);border-radius:var(--r);font-family:inherit;font-size:11px"
        onchange="STATE.buildings[${bi}].usage=this.value">
        ${BLDG_USAGE.map(u=>`<option value="${u}" ${u===b.usage?'selected':''}>${u}</option>`).join('')}
      </select>
      <button class="btn btS no-print" onclick="addFloor(${bi})">+ 층 추가</button>
      <button class="btn btS no-print" style="background:var(--red);color:#fff;border-color:var(--red)" onclick="delBldg(${bi})">삭제</button>
    </div>
    <div class="bbody">
      ${b.floors.length===0?'<div style="color:var(--gray);font-size:11px">층이 없습니다.</div>':
        b.floors.map((f,fi)=>`
        <div class="floor-row">
          <span style="color:var(--tsm);font-size:10px;min-width:24px">${fi+1}</span>
          <input type="text" value="${esc(f.name)}" placeholder="층명" style="flex:2;padding:3px 7px;border:1px solid var(--bdr);border-radius:var(--r);font-family:inherit;font-size:11px"
            onchange="STATE.buildings[${bi}].floors[${fi}].name=this.value;renderRoomList()">
          <input type="number" value="${f.height}" step="0.1" style="width:70px;padding:3px 7px;border:1px solid var(--bdr);border-radius:var(--r);font-family:inherit;font-size:11px"
            onchange="STATE.buildings[${bi}].floors[${fi}].height=parseFloat(this.value)||3.0">
          <label style="font-size:10px;color:var(--tsm);white-space:nowrap">층고(m)</label>
          <span class="no-print" style="color:var(--red);cursor:pointer;padding:1px 5px;font-size:13px" onclick="delFloor(${bi},${fi})">✕</span>
        </div>`).join('')
      }
    </div>
  </div>`).join('');
}

function addBldg(){
  STATE.buildings.push({id:'B'+(STATE._nB++),name:'건물'+(STATE.buildings.length+1),usage:'공장/산업시설',floors:[]});
  renderBldgTree();
}
function delBldg(bi){
  if(!confirm('건물을 삭제하시겠습니까? 해당 건물의 실도 모두 삭제됩니다.'))return;
  const bid=STATE.buildings[bi].id;
  STATE.buildings.splice(bi,1);
  STATE.rooms=STATE.rooms.filter(r=>r.bldgId!==bid);
  if(selRid&&!STATE.rooms.find(r=>r.id===selRid))selRid=null;
  renderBldgTree();renderRoomList();renderRoomDetail();
}
function addFloor(bi){
  const b=STATE.buildings[bi];
  b.floors.push({id:'F'+(STATE._nF++),name:(b.floors.length+1)+'층',height:4.0});
  renderBldgTree();
}
function delFloor(bi,fi){
  if(!confirm('층을 삭제하시겠습니까?'))return;
  const fid=STATE.buildings[bi].floors[fi].id;
  STATE.buildings[bi].floors.splice(fi,1);
  STATE.rooms.forEach(r=>{if(r.floorId===fid)r.floorId='';});
  renderBldgTree();renderRoomList();
}

// ══════════════════════════════════════════════
//  ROOM HELPERS
// ══════════════════════════════════════════════
function newRoom(){
  const b0=STATE.buildings[0], f0=b0?.floors[0];
  return {
    id:'R'+(STATE._nR++), name:'새 실',
    bldgId:b0?.id||'', floorId:f0?.id||'',
    type:'office',
    width:0, depth:0, height:f0?.height||4.0,
    cdb:26, crh:50, hdb:21, hrh:50,
    wallN:{en:false,len:0,u:0.24}, wallE:{en:false,len:0,u:0.24},
    wallS:{en:true, len:0,u:0.24}, wallW:{en:false,len:0,u:0.24},
    winN:{w:0,h:0,shgc:0.35,u:2.10}, winE:{w:0,h:0,shgc:0.35,u:2.10},
    winS:{w:0,h:0,shgc:0.35,u:2.10}, winW:{w:0,h:0,shgc:0.35,u:2.10},
    iw1:{len:0,u:2.08}, iw2:{len:0,u:2.08}, iw3:{len:0,u:2.08}, iw4:{len:0,u:2.08},
    roofOn:false, roofA:0, roofU:0.11,
    floorOn:false, floorU:2.08,
    infACH:0.5, ventACH:5,
    od:0.05, lw:15, eqKW:0,
    ce:'EHP', he:'EHP', ve:'전열교환기',
    capC:{model:'',cnt:1,cc:0,hc:0,pw:'',volt:'',ref:'',gas:'',liq:'',note:''},
    capEo:{model:'',cnt:1,cc:0,hc:0,pw:'',volt:'',ref:'',gas:'',liq:'',note:''},
    capH:{model:'',cnt:1,cap:0,capk:0,af:0,fp:'',volt:'',note:''},
    capV:{model:'',cnt:1,fno:'',drv:'직결',saf:0,eaf:0,af:0,sp:0,mp:'',volt:'',note:''},
    capHW:{model:'',cnt:1,lph:0,kw:0,volt:'',note:''},
    note:'',
  };
}
function gA(r){return r.width*r.depth;}
function gV(r){return r.width*r.depth*r.height;}
function getBF(bldgId,floorId){
  const b=STATE.buildings.find(x=>x.id===bldgId);
  const f=b?.floors.find(x=>x.id===floorId);
  return {b,f};
}
function getRi(){return STATE.rooms.findIndex(r=>r.id===selRid);}

// ══════════════════════════════════════════════
//  ROOM LIST
// ══════════════════════════════════════════════
function addRoom(){
  const r=newRoom(); STATE.rooms.push(r);
  selRid=r.id; renderRoomList(); renderRoomDetail();
}
function delRoom(id){
  if(!confirm('삭제하시겠습니까?'))return;
  STATE.rooms=STATE.rooms.filter(r=>r.id!==id);
  if(selRid===id)selRid=STATE.rooms[0]?.id||null;
  renderRoomList();renderRoomDetail();
}
function selRoom(id){selRid=id;renderRoomList();renderRoomDetail();}

function renderRoomList(){
  const el=document.getElementById('rls');
  if(!STATE.rooms.length){el.innerHTML='<div class="empty" style="padding:16px;font-size:11px">실이 없습니다.</div>';return;}
  let html='';
  STATE.buildings.forEach(b=>{
    const bRooms=STATE.rooms.filter(r=>r.bldgId===b.id);
    if(!bRooms.length)return;
    html+=`<div class="rgi">${esc(b.name)}</div>`;
    b.floors.forEach(f=>{
      const fRooms=bRooms.filter(r=>r.floorId===f.id);
      if(!fRooms.length)return;
      html+=`<div class="rfi">${esc(f.name)}</div>`;
      fRooms.forEach(r=>{
        html+=`<div class="ri ${r.id===selRid?'sel':''}" onclick="selRoom('${r.id}')">
          <div><div class="ri-n">${esc(r.name)}</div><div class="ri-s">${f1(gA(r))} m² · ${RT[r.type]?.lb||r.type}</div></div>
          <span class="ri-d no-print" onclick="event.stopPropagation();delRoom('${r.id}')">✕</span>
        </div>`;
      });
    });
    // unassigned to a floor
    const uRooms=bRooms.filter(r=>!b.floors.find(f=>f.id===r.floorId));
    uRooms.forEach(r=>{
      html+=`<div class="ri ${r.id===selRid?'sel':''}" onclick="selRoom('${r.id}')">
        <div><div class="ri-n">${esc(r.name)}</div><div class="ri-s">${f1(gA(r))} m² [층 미지정]</div></div>
        <span class="ri-d no-print" onclick="event.stopPropagation();delRoom('${r.id}')">✕</span>
      </div>`;
    });
  });
  // completely unassigned
  const u2=STATE.rooms.filter(r=>!STATE.buildings.find(b=>b.id===r.bldgId));
  u2.forEach(r=>{
    html+=`<div class="ri ${r.id===selRid?'sel':''}" onclick="selRoom('${r.id}')">
      <div><div class="ri-n">${esc(r.name)}</div><div class="ri-s">${f1(gA(r))} m² [건물 미지정]</div></div>
      <span class="ri-d no-print" onclick="event.stopPropagation();delRoom('${r.id}')">✕</span>
    </div>`;
  });
  el.innerHTML=html;
}

// ══════════════════════════════════════════════
//  ROOM DETAIL
// ══════════════════════════════════════════════
function sR(k,v){const i=getRi();if(i<0)return;STATE.rooms[i][k]=v;}
function sRr(k,v){sR(k,v);renderRoomDetail();renderRoomList();}
function sRd(k,v){sR(k,v);renderRoomDetail();}
function sW(dir,k,v){const i=getRi();if(i<0)return;STATE.rooms[i]['wall'+dir][k]=v;}
function sWw(dir,k,v){const i=getRi();if(i<0)return;STATE.rooms[i]['win'+dir][k]=v;}
function sIW(n,k,v){const i=getRi();if(i<0)return;STATE.rooms[i]['iw'+n][k]=v;}

function setRoomType(tp){
  const i=getRi();if(i<0)return;
  const rt=RT[tp]; if(!rt)return;
  const r=STATE.rooms[i];
  r.type=tp; r.cdb=rt.cdb; r.crh=rt.crh; r.hdb=rt.hdb; r.hrh=rt.hrh;
  r.od=rt.od; r.lw=rt.lw; r.infACH=rt.ia; r.ventACH=rt.va;
  r.ce=rt.ce; r.he=rt.he; r.ve=rt.ve;
  renderRoomDetail();renderRoomList();
}
function onBldgChange(bid){
  const i=getRi();if(i<0)return;
  const b=STATE.buildings.find(x=>x.id===bid);
  STATE.rooms[i].bldgId=bid;
  if(b&&b.floors.length){
    STATE.rooms[i].floorId=b.floors[0].id;
    STATE.rooms[i].height=b.floors[0].height;
  }else STATE.rooms[i].floorId='';
  renderRoomDetail();renderRoomList();
}
function onFloorChange(fid){
  const i=getRi();if(i<0)return;
  STATE.rooms[i].floorId=fid;
  const r=STATE.rooms[i];
  const {f}=getBF(r.bldgId,fid);
  if(f) STATE.rooms[i].height=f.height;
  renderRoomDetail();renderRoomList();
}
function togCool(none){const i=getRi();if(i<0)return;STATE.rooms[i].cdb=none?null:26;renderRoomDetail();}
function togHeat(none){const i=getRi();if(i<0)return;STATE.rooms[i].hdb=none?null:5;renderRoomDetail();}

function renderRoomDetail(){
  const el=document.getElementById('rdc');
  if(!selRid){el.innerHTML='<div class="empty">실을 선택하세요.</div>';return;}
  const i=getRi(); if(i<0){el.innerHTML='<div class="empty">실 없음</div>';return;}
  const r=STATE.rooms[i];
  const area=gA(r), vol=gV(r);
  const occ=r.od*area, lightW=r.lw*area*1.08, infCMH=vol*r.infACH, ventCMH=vol*r.ventACH;
  const {b,f}=getBF(r.bldgId,r.floorId);

  const bOpts=STATE.buildings.map(x=>`<option value="${x.id}" ${x.id===r.bldgId?'selected':''}>${esc(x.name)}</option>`).join('');
  const fOpts=(b?b.floors:[]).map(x=>`<option value="${x.id}" ${x.id===r.floorId?'selected':''}>${esc(x.name)}</option>`).join('');
  const tOpts=Object.keys(RT).map(k=>`<option value="${k}" ${k===r.type?'selected':''}>${RT[k].lb}</option>`).join('');
  const ceOpts=COOL_EQUIPS.map(e=>`<option value="${e}" ${e===r.ce?'selected':''}>${e}</option>`).join('');
  const heOpts=HEAT_EQUIPS.map(e=>`<option value="${e}" ${e===r.he?'selected':''}>${e}</option>`).join('');
  const veOpts=VENT_EQUIPS.map(e=>`<option value="${e}" ${e===r.ve?'selected':''}>${e}</option>`).join('');

  const wallRow=(dir,wo)=>`
    <tr>
      <td class="C" style="font-weight:700">${dir}</td>
      <td class="C"><input type="checkbox" ${wo.en?'checked':''} onchange="sW('${dir}','en',this.checked)"></td>
      <td><input type="number" value="${wo.len}" step="0.1" ${!wo.en?'disabled':''} onchange="sW('${dir}','len',parseFloat(this.value)||0);renderRoomDetail()"></td>
      <td class="au C">${f1(wo.len*r.height)}</td>
      <td><input type="number" value="${wo.u}" step="0.01" onchange="sW('${dir}','u',parseFloat(this.value)||0.24)"></td>
    </tr>`;
  const winRow=(dir,wo)=>`
    <tr>
      <td class="C" style="font-weight:700">${dir}</td>
      <td><input type="number" value="${wo.w}" step="0.1" onchange="sWw('${dir}','w',parseFloat(this.value)||0);renderRoomDetail()"></td>
      <td><input type="number" value="${wo.h}" step="0.1" onchange="sWw('${dir}','h',parseFloat(this.value)||0);renderRoomDetail()"></td>
      <td class="au C">${f1(wo.w*wo.h)}</td>
      <td><input type="number" value="${wo.shgc}" step="0.01" min="0" max="1" onchange="sWw('${dir}','shgc',parseFloat(this.value)||0.35)"></td>
      <td><input type="number" value="${wo.u}" step="0.01" onchange="sWw('${dir}','u',parseFloat(this.value)||2.10)"></td>
    </tr>`;
  const iwRow=(n,iw,def)=>`
    <tr>
      <td class="C">(${n}) ${def?'기본='+def:''}</td>
      <td><input type="number" value="${iw.len}" step="0.1" placeholder="${def}" onchange="sIW(${n},'len',parseFloat(this.value)||0);renderRoomDetail()"></td>
      <td class="au C">${f1(iw.len*r.height)}</td>
      <td><input type="number" value="${iw.u}" step="0.01" onchange="sIW(${n},'u',parseFloat(this.value)||2.08)"></td>
      <td class="au C">1.25</td>
    </tr>`;

  el.innerHTML=`
<div class="st" style="margin-top:0">${esc(r.name)} — 실 상세</div>

<div class="card"><div class="ch">§1 기본 정보</div><div class="cb">
  <div class="fg c3">
    <div class="fv"><label>실 명칭</label><input type="text" value="${esc(r.name)}" onchange="sRr('name',this.value)"></div>
    <div class="fv"><label>건물</label><select onchange="onBldgChange(this.value)">${bOpts}</select></div>
    <div class="fv"><label>층</label><select onchange="onFloorChange(this.value)">${fOpts}</select></div>
    <div class="fv"><label>실 용도 (선택 시 자동 세팅)</label><select onchange="setRoomType(this.value)">${tOpts}</select></div>
    <div class="fv" style="grid-column:span 2"><label>비고</label><input type="text" value="${esc(r.note)}" onchange="sR('note',this.value)"></div>
  </div>
  <div class="fg fg5" style="margin-top:10px">
    <div class="fv"><label>가로 (m)</label><input type="number" value="${r.width}" step="0.1" onchange="sRd('width',parseFloat(this.value)||0)"></div>
    <div class="fv"><label>세로 (m)</label><input type="number" value="${r.depth}" step="0.1" onchange="sRd('depth',parseFloat(this.value)||0)"></div>
    <div class="fv"><label>바닥면적 (m²) 자동</label><input class="au" readonly value="${f1(area)}"></div>
    <div class="fv"><label>천장고(층고, m)</label><input type="number" value="${r.height}" step="0.1" onchange="sRd('height',parseFloat(this.value)||3.0)"></div>
    <div class="fv"><label>체적 (m³) 자동</label><input class="au" readonly value="${f1(vol)}"></div>
  </div>
</div></div>

<div class="card"><div class="ch">§2 실내 설계조건</div><div class="cb">
  <div class="fg c2">
    <div>
      <div style="font-weight:700;color:var(--bl);font-size:11px;margin-bottom:6px">여름 (냉방)</div>
      <div class="fgr" style="flex-wrap:wrap;gap:8px">
        <label class="fgr" style="font-size:11px;gap:4px"><input type="checkbox" ${r.cdb===null?'checked':''} onchange="togCool(this.checked)"> 냉방없음</label>
        ${r.cdb!==null?`
        <div class="fv" style="flex:1"><label>설계온도 (℃ DB)</label><input type="number" value="${r.cdb}" step="0.5" onchange="sR('cdb',parseFloat(this.value)||26)"></div>
        <div class="fv" style="flex:1"><label>습도 (%RH)</label><input type="number" value="${r.crh??''}" placeholder="관리없음" step="1" onchange="sR('crh',this.value===''?null:parseFloat(this.value))"></div>

        <label class="fgr" style="font-size:11px;gap:4px"><input type="checkbox" ${r.hdb===null?'checked':''} onchange="togHeat(this.checked)"> 난방없음</label>
        ${r.hdb!==null?`
        <div class="fv" style="flex:1"><label>설계온도 (℃ DB)</label><input type="number" value="${r.hdb}" step="0.5" onchange="sR('hdb',parseFloat(this.value)||5)"></div>

</div></div>

// ══════════════════════════════════════════════
//  LOAD CALCULATION ENGINE
// ══════════════════════════════════════════════
function calcLE(room){
  const p=STATE.project;
  const outDB=p.cust||p.cdb, outWB=p.cwb, outH=p.hdb;
  const area=gA(room), h=room.height, vol=area*h;
  const infCMH=vol*room.infACH;
  const occ=room.od*area;
  const lightW=room.lw*area*1.08;
  const eqW=room.eqKW*1000;
  const roofA=room.roofA||area;
  const dTc=room.cdb!==null?outDB-room.cdb:null;
  const dTh=room.hdb!==null?room.hdb-outH:null;
  const dOm=room.cdb!==null?dOmega(outDB,outWB,room.cdb,room.crh||50):0;
  const outRH_val=RHfromWB(outDB,outWB);

  const DIRS=['N','E','S','W'];

  // Per time-slot sensible items
  const td=TIME_SLOTS.map((_,ti)=>{
    if(dTc===null) return null;
    // Solar gain by direction
    const sg={N:0,E:0,S:0,W:0};
    DIRS.forEach(d=>{const wn=room['win'+d];sg[d]=wn.w*wn.h*wn.shgc*(SR[d]||SR.N)[ti];});
    // Wall conduction (time-independent ΔT)
    const wc={N:0,E:0,S:0,W:0};
    DIRS.forEach(d=>{const wd=room['wall'+d];if(wd.en)wc[d]=wd.u*wd.len*h*dTc;});
    // Roof
    const rc=room.roofOn?room.roofU*roofA*(dTc+5):0;
    // Glass conduction
    const gc={N:0,E:0,S:0,W:0};
    DIRS.forEach(d=>{const wn=room['win'+d];gc[d]=wn.u*wn.w*wn.h*dTc;});
    // Interior walls
    const iw=[
      room.iw1.len>0?room.iw1.u*room.iw1.len*h*1.25:0,
      room.iw2.len>0?room.iw2.u*room.iw2.len*h*1.25:0,
      room.iw3.len>0?room.iw3.u*room.iw3.len*h*1.25:0,
      room.iw4.len>0?room.iw4.u*room.iw4.len*h*1.25:0,
    ];
    const flC=room.floorOn?room.floorU*area*1.25:0;
    const infS=infCMH*dTc*0.336;
    const st1=Object.values(sg).reduce((a,b)=>a+b,0)+Object.values(wc).reduce((a,b)=>a+b,0)+rc+Object.values(gc).reduce((a,b)=>a+b,0)+iw.reduce((a,b)=>a+b,0)+flC+infS;
    const st2=occ*57+eqW+lightW;
    const rsh=st1+st2;
    return {sg,wc,rc,gc,iw,flC,infS,st1,st2,rsh};
  });

  // Latent (time-independent)
  const infL=room.cdb!==null?infCMH*dOm*833:0;
  const pplL=room.cdb!==null?occ*62:0;
  const rlh=infL+pplL;

  // Per-time totals
  const tsh=td.map(d=>d?d.rsh*1.1:0);
  const tlh=rlh*1.1;
  const rth=tsh.map(s=>s+tlh);
  const maxRth=Math.max(0,...rth);
  const pkIdx=rth.indexOf(maxRth);

  // Heating
  let hwN=0,hwE=0,hwS=0,hwW=0,hroof=0,hglass=0,hinf=0;
  if(dTh!==null){
    DIRS.forEach(d=>{const wd=room['wall'+d];if(wd.en){const v=wd.u*wd.len*h*dTh;if(d==='N')hwN=v;else if(d==='E')hwE=v;else if(d==='S')hwS=v;else hwW=v;}});
    if(room.roofOn)hroof=room.roofU*roofA*dTh;
    DIRS.forEach(d=>{const wn=room['win'+d];hglass+=wn.u*wn.w*wn.h*dTh;});
    hinf=infCMH*0.336*dTh;
  }
  const hRsh=hwN+hwE+hwS+hwW+hroof+hglass+hinf;
  const totalH=Math.max(0,hRsh*1.1);

  return {
    area,h,vol,infCMH,occ,lightW,eqW,roofA,dOm,outRH_val,
    dTc,dTh,td,tsh,tlh,rth,maxRth,pkIdx,
    infL,pplL,rlh,
    hwN,hwE,hwS,hwW,hroof,hglass,hinf,hRsh,totalH,
  };
}

// ══════════════════════════════════════════════
//  JSON
// ══════════════════════════════════════════════
function saveJSON(){
  const b=new Blob([JSON.stringify(STATE,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=(STATE.project.name||'hvac-calc')+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
function loadJSON(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{STATE=JSON.parse(e.target.result);
      selRid=STATE.rooms[0]?.id||null;
      loadPtoForm();renderBldgTree();renderRoomList();renderRoomDetail();
      alert('불러오기 완료');
    }catch{alert('JSON 파싱 오류');}
  };
  r.readAsText(f);input.value='';
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function f1(n){return typeof n==='number'?n.toLocaleString('ko-KR',{maximumFractionDigits:1}):'—';}
function f0(n){return typeof n==='number'?Math.round(n).toLocaleString('ko-KR'):'—';}
function fW(n){if(n===null||n===undefined)return'—';return Math.round(n).toLocaleString('ko-KR');}

init();

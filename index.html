<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC 부하계산서 + 용량계산서</title>
<style>
:root {
  --bg:#f1f5f9; --surface:#fff; --navy:#1e3a5f; --navy2:#2d5a8e;
  --red:#dc2626; --blue:#2563eb; --blue-bg:#eff6ff; --green:#16a34a;
  --gray:#64748b; --gl:#e2e8f0; --glr:#f8fafc; --border:#cbd5e1;
  --text:#1e293b; --tsm:#475569; --r:6px; --sh:0 1px 3px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:13px}

/* TAB BAR */
#tab-bar{display:flex;background:var(--navy);padding:0 16px;gap:2px}
.tab-btn{padding:12px 20px;color:rgba(255,255,255,.65);cursor:pointer;border:none;background:none;font-size:13px;font-family:inherit;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn.active{color:#fff;border-bottom-color:#60a5fa}
.tab-btn:hover{color:#fff}

/* TOOLBAR */
#toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
#toolbar .proj-name{font-weight:700;color:var(--navy);font-size:14px;flex:1}
.btn{padding:6px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{background:var(--navy2)}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-sm{padding:3px 10px;font-size:11px}

/* PANELS */
.tab-panel{display:none;height:calc(100vh - 88px);overflow:auto;padding:16px}
.tab-panel.active{display:block}

/* CARDS */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:12px}
.card-header{padding:10px 14px;border-bottom:1px solid var(--border);font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px;font-size:13px}
.card-body{padding:14px}

/* FORM GRID */
.fg{display:grid;gap:10px}
.col2{grid-template-columns:1fr 1fr}
.col3{grid-template-columns:1fr 1fr 1fr}
.col4{grid-template-columns:1fr 1fr 1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;color:var(--tsm);font-weight:600}
.form-group input,.form-group select,.form-group textarea{padding:6px 8px;border:1px solid var(--border);border-radius:var(--r);font-size:12px;font-family:inherit;color:var(--text);background:#fff}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--blue)}
.form-group input.auto{background:var(--blue-bg);color:var(--blue);font-weight:600}
.form-group input[readonly]{background:var(--glr);color:var(--tsm)}

/* SPLIT LAYOUT */
#tab1-wrap{display:flex;height:calc(100vh - 88px);gap:0}
#room-list-panel{width:260px;min-width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
#room-list-panel .ph{padding:10px 12px;background:var(--navy);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:space-between}
#room-list-scroll{flex:1;overflow-y:auto}
.room-item{padding:8px 12px;border-bottom:1px solid var(--gl);cursor:pointer;transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.room-item:hover{background:var(--bg)}
.room-item.selected{background:var(--blue-bg);border-left:3px solid var(--blue)}
.room-item-name{font-weight:600;font-size:12px}
.room-item-sub{font-size:11px;color:var(--tsm);margin-top:2px}
.room-item-del{color:var(--red);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:3px}
.room-item-del:hover{background:#fee2e2}
#room-detail-panel{flex:1;overflow-y:auto;padding:16px}

/* TABLES */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--navy);color:#fff;padding:7px 6px;text-align:center;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:5px 6px;border-bottom:1px solid var(--gl);text-align:right;vertical-align:middle}
td.left{text-align:left}
td.center{text-align:center}
tr:hover td{background:#f8fafc}
td.auto{background:var(--blue-bg);color:var(--blue);font-weight:600}
td.sec{background:#f0f4f8;font-weight:700;color:var(--navy);text-align:left}
td.tot{background:#dbeafe;font-weight:700;color:var(--navy)}
td.max-cell{background:#fef9c3;color:#92400e;font-weight:700}
td input,td select{border:1px solid var(--border);border-radius:4px;padding:3px 5px;font-size:11px;font-family:inherit;width:100%;background:#fff}
td input:focus,td select:focus{outline:none;border-color:var(--blue)}

/* SECTION TITLE */
.stitle{font-size:13px;font-weight:700;color:var(--navy);padding:8px 0 6px;border-bottom:2px solid var(--navy);margin-bottom:10px;margin-top:14px}
.stitle:first-child{margin-top:0}

/* FLOOR LIST */
.floor-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--gl)}
.floor-del{color:var(--red);cursor:pointer;font-size:16px;padding:2px 6px}

/* CAP SUB-TABS */
#cap-subtabs{display:flex;gap:4px;padding:0 0 12px;flex-wrap:wrap}
.csub-btn{padding:6px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:12px;font-family:inherit}
.csub-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}

/* LOAD ESTIMATE CARD */
.le-card{background:var(--surface);border:2px solid var(--navy);border-radius:var(--r);margin-bottom:20px;break-inside:avoid}
.le-header{background:var(--navy);color:#fff;padding:10px 14px}
.le-header-title{font-size:15px;font-weight:700;letter-spacing:.5px}
.le-header-info{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px;font-size:11px}
.le-header-info span{color:rgba(255,255,255,.85)}
.le-header-info strong{color:#fff}
.le-cond{background:#f0f7ff;padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:20px;flex-wrap:wrap}
.le-body{padding:14px}
.le-no-cool{text-align:center;padding:20px;color:var(--gray);font-size:13px;border:2px dashed var(--border);border-radius:var(--r);margin-bottom:12px}
.le-max-row td{background:#fef9c3 !important;color:#92400e !important;font-weight:700 !important}
.le-design-row td{background:#dcfce7 !important;color:#166534 !important;font-weight:700 !important}
.le-heat-section{background:#fff7f7;border:1px solid #fca5a5;border-radius:var(--r);padding:12px;margin-top:12px}
.le-heat-title{font-weight:700;color:var(--red);margin-bottom:8px;font-size:12px}

/* BADGE */
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-red{background:#fee2e2;color:var(--red)}
.badge-green{background:#dcfce7;color:var(--green)}
.badge-gray{background:var(--gl);color:var(--tsm)}
.badge-orange{background:#fff7ed;color:#c2410c}

.empty-msg{text-align:center;padding:40px;color:var(--tsm);font-size:13px}

/* PRINT */
@media print{
  #tab-bar,#toolbar,.no-print{display:none !important}
  .tab-panel{display:block !important;height:auto !important;overflow:visible !important;padding:0 !important}
  body{background:#fff;font-size:9pt}
  .le-card{break-after:page;border:1px solid #000}
  .le-header{background:#1e3a5f !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  th{background:#1e3a5f !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.auto{background:#eff6ff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.max-cell{background:#fef9c3 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  td.le-design-row{background:#dcfce7 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .card{box-shadow:none}
  #cap-subtabs{display:none}
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab(0)">① 프로젝트 설정</button>
  <button class="tab-btn" onclick="switchTab(1)">② 실 목록 관리</button>
  <button class="tab-btn" onclick="switchTab(2)">③ 부하계산서</button>
  <button class="tab-btn" onclick="switchTab(3)">④ 용량계산서</button>
</div>

<div id="toolbar">
  <span class="proj-name" id="proj-name-display">[ 프로젝트명 미설정 ]</span>
  <button class="btn" onclick="saveJSON()">JSON 저장</button>
  <button class="btn" onclick="document.getElementById('file-in').click()">JSON 불러오기</button>
  <input type="file" id="file-in" accept=".json" style="display:none" onchange="loadJSON(this)">
  <button class="btn btn-primary" onclick="window.print()">PDF 출력</button>
</div>

<!-- ① 프로젝트 설정 -->
<div class="tab-panel active" id="tab0">
  <div style="max-width:860px">
    <div class="card">
      <div class="card-header">기본 정보</div>
      <div class="card-body">
        <div class="fg col2">
          <div class="form-group"><label>프로젝트명</label><input type="text" id="p-name" onchange="updateProj()"></div>
          <div class="form-group"><label>발주처</label><input type="text" id="p-client" onchange="updateProj()"></div>
          <div class="form-group"><label>설계사</label><input type="text" id="p-designer" onchange="updateProj()"></div>
          <div class="form-group"><label>작성일</label><input type="date" id="p-date" onchange="updateProj()"></div>
          <div class="form-group" style="grid-column:1/-1"><label>현장 주소</label><input type="text" id="p-address" onchange="updateProj()"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">기상 조건</div>
      <div class="card-body">
        <div class="fg col3">
          <div class="form-group">
            <label>지역 선택</label>
            <select id="p-location" onchange="onLocationChange()"></select>
          </div>
          <div class="form-group"><label>외기 냉방 설계온도 (℃ DB)</label><input type="number" id="p-out-cool-db" class="auto" readonly></div>
          <div class="form-group"><label>외기 냉방 설계온도 (℃ WB)</label><input type="number" id="p-out-cool-wb" class="auto" readonly></div>
          <div class="form-group"><label>외기 난방 설계온도 (℃)</label><input type="number" id="p-out-heat" class="auto" readonly></div>
          <div class="form-group"><label>위도 (°)</label><input type="number" id="p-lat" class="auto" readonly></div>
          <div class="form-group"><label>사용자 정의 외기온 (℃ DB, 선택)</label><input type="number" id="p-out-custom" placeholder="직접 입력 시 사용" onchange="updateProj()"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">건물 일반</div>
      <div class="card-body">
        <div class="fg col4">
          <div class="form-group"><label>건물 용도</label>
            <select id="p-usage" onchange="updateProj()">
              <option value="office">업무시설</option><option value="factory">공장/산업</option>
              <option value="hospital">의료시설</option><option value="school">교육연구</option>
              <option value="hotel">숙박시설</option><option value="etc">기타</option>
            </select>
          </div>
          <div class="form-group"><label>냉방 안전율</label><input type="number" id="p-sf-cool" value="1.10" step="0.01" onchange="updateProj()"></div>
          <div class="form-group"><label>난방 안전율</label><input type="number" id="p-sf-heat" value="1.10" step="0.01" onchange="updateProj()"></div>
          <div class="form-group"><label>비고</label><input type="text" id="p-note" onchange="updateProj()"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        층 구성
        <button class="btn btn-primary btn-sm no-print" onclick="addFloor()" style="margin-left:auto">+ 층 추가</button>
      </div>
      <div class="card-body"><div id="floor-list"></div></div>
    </div>
  </div>
</div>

<!-- ② 실 목록 관리 -->
<div class="tab-panel" id="tab1">
  <div id="tab1-wrap">
    <div id="room-list-panel">
      <div class="ph">
        실 목록
        <button onclick="addRoom()" style="background:#60a5fa;color:#fff;border:none;padding:4px 10px;font-size:11px;border-radius:4px;cursor:pointer">+ 추가</button>
      </div>
      <div id="room-list-scroll"></div>
    </div>
    <div id="room-detail-panel">
      <div id="room-detail-content"><div class="empty-msg">왼쪽 목록에서 실을 선택하거나 추가하세요.</div></div>
    </div>
  </div>
</div>

<!-- ③ 부하계산서 -->
<div class="tab-panel" id="tab2">
  <div id="load-calc-content"><div class="empty-msg">실 목록을 먼저 설정하세요.</div></div>
</div>

<!-- ④ 용량계산서 -->
<div class="tab-panel" id="tab3">
  <div id="cap-subtabs"></div>
  <div id="cap-content"></div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════

const COOL_EQUIPS = ['PAC','EHP','CTH','AHU','FCU','없음'];
const HEAT_EQUIPS = ['EHP','유니트히터','라디에이터','없음'];
const VENT_EQUIPS = ['전열교환기','인라인덕트팬','벽부형팬','루프팬','없음'];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════

let STATE = {
  project:{
    name:'',client:'',designer:'',date:'',address:'',

  const sel = document.getElementById('p-location');
  OUTDOOR_CONDITIONS.forEach(c=>{
    const o = document.createElement('option');
    o.value = c.name; o.textContent = c.name;
    sel.appendChild(o);
  });
  loadStateToForm();
  renderFloorList();
  renderRoomList();
}

//  TAB
// ══════════════════════════════════════════════

function switchTab(idx){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  if(idx===2) renderLoadCalc();
  if(idx===3) renderCapCalc();
}

// ══════════════════════════════════════════════
//  PROJECT FORM
// ══════════════════════════════════════════════

function loadStateToForm(){
  const p = STATE.project;
  document.getElementById('p-name').value = p.name;
  document.getElementById('p-client').value = p.client;
  document.getElementById('p-designer').value = p.designer;
  document.getElementById('p-date').value = p.date;
  document.getElementById('p-address').value = p.address;
  document.getElementById('p-location').value = p.location;
  document.getElementById('p-out-cool-db').value = p.outCoolDB;
  document.getElementById('p-out-cool-wb').value = p.outCoolWB;
  document.getElementById('p-out-heat').value = p.outHeat;
  document.getElementById('p-lat').value = p.lat;
  if(p.outCustom) document.getElementById('p-out-custom').value = p.outCustom;
  document.getElementById('p-usage').value = p.usage;
  document.getElementById('p-sf-cool').value = p.sfCool;
  document.getElementById('p-sf-heat').value = p.sfHeat;
  document.getElementById('p-note').value = p.note||'';
  document.getElementById('proj-name-display').textContent = p.name||'[ 프로젝트명 미설정 ]';
}

function updateProj(){
  const p = STATE.project;
  p.name = document.getElementById('p-name').value;
  p.client = document.getElementById('p-client').value;
  p.designer = document.getElementById('p-designer').value;
  p.date = document.getElementById('p-date').value;
  p.address = document.getElementById('p-address').value;
  p.outCustom = parseFloat(document.getElementById('p-out-custom').value)||null;
  p.usage = document.getElementById('p-usage').value;
  p.sfCool = parseFloat(document.getElementById('p-sf-cool').value)||1.10;
  p.sfHeat = parseFloat(document.getElementById('p-sf-heat').value)||1.10;
  p.note = document.getElementById('p-note').value;
  document.getElementById('proj-name-display').textContent = p.name||'[ 프로젝트명 미설정 ]';
}

function onLocationChange(){
  const loc = document.getElementById('p-location').value;
  const c = OUTDOOR_CONDITIONS.find(x=>x.name===loc);
  if(!c) return;
  STATE.project.location=loc;
  STATE.project.outCoolDB=c.coolDB;
  STATE.project.outCoolWB=c.coolWB;
  STATE.project.outHeat=c.heat;
  STATE.project.lat=c.lat;
  document.getElementById('p-out-cool-db').value=c.coolDB;
  document.getElementById('p-out-cool-wb').value=c.coolWB;
  document.getElementById('p-out-heat').value=c.heat;
  document.getElementById('p-lat').value=c.lat;
}

function renderFloorList(){
  const el = document.getElementById('floor-list');
  if(!STATE.floors.length){el.innerHTML='<div class="empty-msg">층이 없습니다.</div>';return;}
  el.innerHTML = STATE.floors.map((f,i)=>`
    <div class="floor-item">
      <span style="min-width:28px;font-weight:700;color:var(--navy)">${i+1}</span>
      <input type="text" value="${esc(f.name)}" placeholder="층 이름" style="flex:2"
        onchange="STATE.floors[${i}].name=this.value">
      <input type="number" value="${f.height}" step="0.1" style="flex:1;max-width:90px"
        onchange="STATE.floors[${i}].height=parseFloat(this.value)||3.0">
      <label style="font-size:11px;color:var(--tsm);white-space:nowrap">층고(m)</label>
      <span class="floor-del no-print" onclick="delFloor(${i})">✕</span>
    </div>`).join('');
}

function addFloor(){
  STATE.floors.push({id:'F'+Date.now(),name:(STATE.floors.length+1)+'층',height:4.0});
  renderFloorList();
}

function delFloor(idx){
  if(!confirm('이 층을 삭제하시겠습니까?')) return;
  const fid = STATE.floors[idx].id;
  STATE.floors.splice(idx,1);
  STATE.rooms.forEach(r=>{if(r.floorId===fid)r.floorId='';});
  renderFloorList(); renderRoomList();
}

function getRoomArea(r){ return r.width * r.depth; }
function getRoomVol(r){ return getRoomArea(r) * r.height; }

// ══════════════════════════════════════════════
//  ROOM LIST
// ══════════════════════════════════════════════

function addRoom(){
  const r = newRoom();
  STATE.rooms.push(r);
  selectedRoomId = r.id;
  renderRoomList();
  renderRoomDetail();
}

function delRoom(id){
  if(!confirm('이 실을 삭제하시겠습니까?')) return;
  STATE.rooms = STATE.rooms.filter(r=>r.id!==id);
  if(selectedRoomId===id) selectedRoomId = STATE.rooms[0]?.id||null;
  renderRoomList(); renderRoomDetail();
}

function selectRoom(id){
  selectedRoomId = id;
  renderRoomList(); renderRoomDetail();
}

function renderRoomList(){
  const el = document.getElementById('room-list-scroll');
  if(!STATE.rooms.length){el.innerHTML='<div class="empty-msg" style="padding:20px;font-size:12px">실이 없습니다.</div>';return;}
  el.innerHTML = STATE.rooms.map(r=>{
    const fl = STATE.floors.find(f=>f.id===r.floorId);
    const area = fmt1(getRoomArea(r));
    return `<div class="room-item ${r.id===selectedRoomId?'selected':''}" onclick="selectRoom('${r.id}')">
      <div>
        <div class="room-item-name">${esc(r.name)}</div>
        <div class="room-item-sub">${fl?fl.name:'층미지정'} · ${area}m² · ${r.type}</div>
      </div>
      <span class="room-item-del no-print" onclick="event.stopPropagation();delRoom('${r.id}')">✕</span>
    </div>`;
  }).join('');
}

function getRi(){ return STATE.rooms.findIndex(r=>r.id===selectedRoomId); }

function setR(key, val){ const ri=getRi(); if(ri<0)return; STATE.rooms[ri][key]=val; }

function updateRoomType(typeKey){
  const ri=getRi(); if(ri<0)return;
  const rt = ROOM_TYPES.find(t=>t.key===typeKey);
  if(!rt) return;
  const r = STATE.rooms[ri];
  r.type=typeKey;
  r.coolDB=rt.coolDB; r.coolRH=rt.coolRH;
  r.heatDB=rt.heatDB; r.heatRH=rt.heatRH;
  r.occDensity=rt.occDensity; r.lightWm2=rt.lightWm2;
  r.infACH=rt.infACH; r.ventACH=rt.ventACH;
  r.coolEquip=rt.coolEquip; r.heatEquip=rt.heatEquip; r.ventEquip=rt.ventEquip;
  r.occHeat=rt.occHeat;
  renderRoomList(); renderRoomDetail();
}

// ══════════════════════════════════════════════
//  LOAD CALCULATION ENGINE
// ══════════════════════════════════════════════

function calcCoolDetail(room, tIdx){
  const p = STATE.project;
  const outDB = p.outCustom || p.outCoolDB;
  const dT = outDB - (room.coolDB || 26);
  const area = getRoomArea(room);
  const vol  = getRoomVol(room);
  const dWB  = Math.max(0, p.outCoolWB - 19);

  let solar=0, wallCond=0, winCond=0, roofCond=0;
  let infS=0, infL=0, ventS=0, ventL=0;
  let occS=0, occL=0, light=0, equip=0;

  room.windows.forEach(w=>{
    const wA = w.winWidth * w.winHeight; if(!wA) return;
    const sc = SC_VALUES[w.sc]||0.45;
    const sol = (SOLAR_RADIATION[w.dir]||SOLAR_RADIATION['S'])[tIdx];
    solar   += wA * sc * sol;
    winCond += w.uWin * wA * dT;
  });

  room.walls.forEach(w=>{
    if(!w.isExt) return;
    const wA = w.length * room.height; if(!wA) return;
    wallCond += w.uWall * wA * dT;
  });

  if(room.roof.isExt && room.roof.area>0)
    roofCond += room.roof.uRoof * room.roof.area * (dT + 5);

  const infCMH  = vol * room.infACH;
  const ventCMH = vol * room.ventACH;
  infS  = 0.335 * infCMH  * dT;
  infL  = 0.84  * infCMH  * dWB;
  ventS = 0.335 * ventCMH * dT;
  ventL = 0.84  * ventCMH * dWB;

  const occ = room.occDensity * area;
  const hh  = HUMAN_HEAT[room.occHeat]||HUMAN_HEAT.default;
  occS = occ * hh.s;
  occL = occ * hh.l;
  light = room.lightWm2 * area * room.lightFactor;
  equip = room.equipW;

  const total = solar+wallCond+winCond+roofCond+infS+infL+ventS+ventL+occS+occL+light+equip;
  return {solar,wallCond,winCond,roofCond,infS,infL,ventS,ventL,occS,occL,light,equip,total:Math.max(0,total)};
}

function calcHeatDetail(room){
  const p = STATE.project;
  const outH = p.outCustom || p.outHeat;
  const dT   = (room.heatDB||5) - outH;
  const vol  = getRoomVol(room);

  let wallCond=0, winCond=0, roofCond=0, infLoad=0, ventLoad=0;

  room.walls.forEach(w=>{
    if(!w.isExt) return;
    const wA = w.length * room.height; if(!wA) return;
    wallCond += w.uWall * wA * dT;
  });
  room.windows.forEach(w=>{
    const wA = w.winWidth * w.winHeight; if(!wA) return;
    winCond += w.uWin * wA * dT;
  });
  if(room.roof.isExt && room.roof.area>0)
    roofCond += room.roof.uRoof * room.roof.area * dT;

  infLoad  = 0.335 * vol * room.infACH  * dT;
  ventLoad = 0.335 * vol * room.ventACH * dT;

  const total = wallCond+winCond+roofCond+infLoad+ventLoad;
  return {wallCond,winCond,roofCond,infLoad,ventLoad,total:Math.max(0,total)};
}

function getMaxCoolLoad(room){
  if(room.coolLoadManual!==null) return room.coolLoadManual;
  if(room.coolDB===null) return null;
  return Math.max(...TIME_SLOTS.map((_,i)=>calcCoolDetail(room,i).total));
}

function getHeatLoad(room){
  if(room.heatLoadManual!==null) return room.heatLoadManual;
  if(room.heatDB===null) return null;
  return calcHeatDetail(room).total;
}

        <th>난방부하(W)</th><th>×${sfH}(W)</th><th>kW</th>
      </tr></thead>

  let totC=0, totH=0;
  STATE.rooms.forEach(room=>{

  html += `</tbody></table></div></div></div>`;

  el.innerHTML = html;

  const rooms = STATE.rooms.filter(r=>r.heatEquip===type);
  if(!rooms.length){
    el.innerHTML=`<div class="empty-msg">${type}로 선택된 실이 없습니다.</div>`; return;

  let totLoad=0;
  rooms.forEach(r=>{
    const fl  = STATE.floors.find(f=>f.id===r.floorId);
    const hl  = getHeatLoad(r);
    const hld = hl!==null ? hl*p.sfHeat : 0;
    totLoad += hld;
    const rid = r.id;
    html += `<tr>
      <td class="left">${esc(r.name)}</td>
      <td class="center">${fl?fl.name:'—'}</td>
      <td class="auto" style="color:var(--red);font-weight:700">${hld?fmtW(hld):'난방없음'}</td>
      <td><input type="number" value="${r.capHeat.count||1}" min="1" style="width:50px"
        onchange="setCH('${rid}','count',parseInt(this.value)||1)"></td>
      <td><input type="number" value="${r.capHeat.capacity||''}" step="100" placeholder="W"
        onchange="setCH('${rid}','capacity',parseFloat(this.value)||0)"></td>
      <td><input type="number" value="${r.capHeat.airflow||''}" step="10" placeholder="CMH"
        onchange="setCH('${rid}','airflow',parseFloat(this.value)||0)"></td>
      <td><input type="text" value="${esc(r.capHeat.fanPower)}" placeholder="kW"
        onchange="setCH('${rid}','fanPower',this.value)"></td>
      <td><input type="text" value="${esc(r.capHeat.voltage)}" placeholder="전원"
        onchange="setCH('${rid}','voltage',this.value)"></td>
      <td><input type="text" value="${esc(r.capHeat.note)}"
        onchange="setCH('${rid}','note',this.value)"></td>
    </tr>`;
  });

  html += `<tr class="tot"><td class="left" colspan="2">합 계</td>
    <td>${fmtW(totLoad)}</td><td colspan="6"></td></tr>`;
  html += `</tbody></table></div></div></div>`;
  el.innerHTML = html;
}

function renderCapVent(el){
  const VENT_TYPES_FAN = ['전열교환기','인라인덕트팬','벽부형팬','루프팬'];
  const rooms = STATE.rooms.filter(r=>VENT_TYPES_FAN.includes(r.ventEquip));
  if(!rooms.length){
    el.innerHTML=`<div class="empty-msg">환기설비가 선택된 실이 없습니다.</div>`; return;
  }

  let html = `<div class="card">
    <div class="card-header">환기설비 용량계산서</div>
    <div class="card-body"><div class="tbl-wrap"><table>
    <thead><tr>
      <th>실 명칭</th><th>층</th><th>환기방식</th>
      <th>필요환기량(m³/h)</th>
      <th>수량</th><th>팬번호(Ø)</th><th>동력전달</th>
      <th>풍량(CMH)</th><th>정압(Pa)</th><th>모터동력(kW)</th><th>전원</th><th>비고</th>
    </tr></thead><tbody>`;

  let totVent=0;
  rooms.forEach(r=>{
    const fl      = STATE.floors.find(f=>f.id===r.floorId);
    const needCMH = getRoomVol(r) * r.ventACH;
    totVent += needCMH;
    const rid = r.id;
    html += `<tr>
      <td class="left">${esc(r.name)}</td>
      <td class="center">${fl?fl.name:'—'}</td>
      <td class="center">${r.ventEquip}</td>
      <td class="auto">${fmtW(needCMH)}</td>
      <td><input type="number" value="${r.capVent.count||1}" min="1" style="width:50px"
        onchange="setCV('${rid}','count',parseInt(this.value)||1)"></td>
      <td><input type="text" value="${esc(r.capVent.fanNo)}" placeholder="Ø200"
        onchange="setCV('${rid}','fanNo',this.value)"></td>
      <td><select onchange="setCV('${rid}','drive',this.value)">
        <option ${r.capVent.drive==='직결'?'selected':''}>직결</option>
        <option ${r.capVent.drive==='벨트'?'selected':''}>벨트</option>
      </select></td>
      <td><input type="number" value="${r.capVent.airflow||''}" step="10" placeholder="CMH"
        onchange="setCV('${rid}','airflow',parseFloat(this.value)||0)"></td>
      <td><input type="number" value="${r.capVent.staticPressure||''}" step="5" placeholder="Pa"
        onchange="setCV('${rid}','staticPressure',parseFloat(this.value)||0)"></td>
      <td><input type="text" value="${esc(r.capVent.motorPower)}" placeholder="kW"
        onchange="setCV('${rid}','motorPower',this.value)"></td>
      <td><input type="text" value="${esc(r.capVent.voltage)}" placeholder="전원"
        onchange="setCV('${rid}','voltage',this.value)"></td>
      <td><input type="text" value="${esc(r.capVent.note)}"
        onchange="setCV('${rid}','note',this.value)"></td>
    </tr>`;
  });

  html += `<tr class="tot"><td class="left" colspan="3">합 계 필요환기량</td>
    <td>${fmtW(totVent)} m³/h</td><td colspan="8"></td></tr>`;
  html += `</tbody></table></div></div></div>`;
  el.innerHTML = html;
}

function renderCapSummary(el){
  const p = STATE.project;
  let html = `<div class="card">
    <div class="card-header">용량계산 전체 요약</div>
    <div class="card-body"><div class="tbl-wrap"><table>
    <thead><tr>
      <th>실 명칭</th><th>층</th><th>면적(m²)</th>
      <th>최대냉방부하(W)</th><th>설계냉방(W)</th><th>냉방설비</th>
      <th>난방부하(W)</th><th>설계난방(W)</th><th>난방설비</th>
      <th>필요환기(m³/h)</th><th>환기설비</th>
    </tr></thead><tbody>`;

  let tC=0,tH=0,tV=0;
  STATE.rooms.forEach(r=>{
    const fl  = STATE.floors.find(f=>f.id===r.floorId);
    const mc  = getMaxCoolLoad(r);
    const hl  = getHeatLoad(r);
    const vc  = getRoomVol(r)*r.ventACH;
    const mcd = mc!==null?mc*p.sfCool:null;
    const hld = hl!==null?hl*p.sfHeat:null;
    if(mcd)tC+=mcd; if(hld)tH+=hld; tV+=vc;
    html+=`<tr>
      <td class="left">${esc(r.name)}</td>
      <td class="center">${fl?fl.name:'—'}</td>
      <td class="center">${fmt1(getRoomArea(r))}</td>
      <td class="auto">${mc!==null?fmtW(mc):'—'}</td>
      <td class="auto" style="font-weight:700">${mcd!==null?fmtW(mcd):'냉방없음'}</td>
      <td class="center">${r.coolEquip}</td>
      <td class="auto">${hl!==null?fmtW(hl):'—'}</td>
      <td class="auto" style="color:var(--red);font-weight:700">${hld!==null?fmtW(hld):'난방없음'}</td>
      <td class="center">${r.heatEquip}</td>
      <td class="auto">${fmtW(vc)}</td>
      <td class="center">${r.ventEquip}</td>
    </tr>`;
  });

  html+=`<tr class="tot">
    <td class="left" colspan="4">전체 합계</td>
    <td>${fmtW(tC)} (${fmt1(tC/1000)} kW)</td><td></td>
    <td></td><td>${fmtW(tH)} (${fmt1(tH/1000)} kW)</td><td></td>
    <td>${fmtW(tV)} m³/h</td><td></td>
  </tr>`;
  html+=`</tbody></table></div></div></div>`;
  el.innerHTML = html;
}

//  JSON SAVE / LOAD
// ══════════════════════════════════════════════

function saveJSON(){
  const blob = new Blob([JSON.stringify(STATE,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (STATE.project.name||'hvac-calc')+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}

function loadJSON(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      STATE = JSON.parse(e.target.result);
      selectedRoomId = STATE.rooms[0]?.id||null;
      loadStateToForm(); renderFloorList(); renderRoomList(); renderRoomDetail();
      alert('불러오기 완료');
    }catch{ alert('JSON 파싱 오류'); }
  };
  reader.readAsText(file);
  input.value='';
}

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt1(n){ return typeof n==='number'?n.toLocaleString('ko-KR',{maximumFractionDigits:1}):'—'; }
function fmt0(n){ return typeof n==='number'?Math.round(n).toLocaleString('ko-KR'):'—'; }
function fmtW(n){ if(n===null||n===undefined)return'—'; return Math.round(n).toLocaleString('ko-KR'); }

init();
